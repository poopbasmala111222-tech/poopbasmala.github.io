<section id="Add courses" class="add courses">
        <div class="container">
            <div class="add courses-content">
                <h2> If you want to add courses ,that's here</h2>
                <p> To add new courses , you must include the course name ,lectures,credit hours,and notes.</p>
                <form class="course-form">
                    <h2>Add Course</h2>
                    <label>Course Name</label>
                    <input type="text" name="course-name" placeholder="Enter course name" required>
                    <label>Lecture</label>
                    <input type="text" name="lecture" placeholder="Enter lecture name" required>
                    <label>Credit Hours</label>
                    <input type="number" name="hours" placeholder="Enter hours" required>
                    <label>Notes</label>
                    <input type="text" name="notes" placeholder="Enter the notes" required>
                    <button type="submit">Add Course</button>
                </form>
            </div>
        </div>
    </section>
